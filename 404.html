<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ups, te perdiste | Compressly</title>
    <meta name="theme-color" content="#0B0B13">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            background-color: #09090B;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .radial-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.15), transparent 60%);
            z-index: 1;
            pointer-events: none;
        }

        .bento-card {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
        }
    </style>
</head>

<body class="antialiased min-h-screen flex flex-col justify-center items-center relative overflow-hidden text-white">

    <div class="radial-bg"></div>

    <div class="relative z-10 w-full max-w-lg px-4 text-center">
        <div
            class="bento-card p-12 shadow-[0_0_50px_rgba(139,92,246,0.1)] border-t-primary-500/50 flex flex-col items-center">

            <div
                class="w-24 h-24 bg-primary-500/10 rounded-full flex items-center justify-center mb-6 text-primary-400 relative">
                <div class="absolute inset-0 bg-primary-500/20 rounded-full blur-xl animate-pulse"></div>
                <i data-lucide="ghost" class="w-12 h-12 relative z-10"></i>
            </div>

            <h1
                class="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-primary-400 to-primary-600 mb-2">
                404</h1>
            <h2 class="text-2xl font-extrabold text-white mb-4">Magia no encontrada</h2>

            <p class="text-gray-400 font-medium mb-8 leading-relaxed">
                Parece que la página que buscas ha sido comprimida tanto que desapareció.
                Volvamos a la zona segura.
            </p>

            <a href="/"
                class="w-full bg-primary-500 hover:bg-primary-600 active:scale-95 text-white font-extrabold py-4 px-8 rounded-xl transition-all shadow-[0_0_20px_rgba(139,92,246,0.3)] flex items-center justify-center gap-3">
                <i data-lucide="home" class="w-5 h-5"></i> Volver al Inicio
            </a>
        </div>
    </div>

    <script>lucide.createIcons();</script>
</body>

</html>
