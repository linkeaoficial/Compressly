<!DOCTYPE html>
<html lang="es" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ups, te perdiste | Compressly</title>
    <meta name="theme-color" content="#0B0B13">
    <link rel="icon" type="image/png" href="imagenes/compressly_logo2.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            400: '#a78bfa',
                            500: '#8b5cf6',
                            600: '#7c3aed',
                        }
                    }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <script>
        if (!localStorage.getItem('theme')) localStorage.setItem('theme', 'dark');
        if (localStorage.getItem('theme') === 'light') document.documentElement.classList.remove('dark');
        else document.documentElement.classList.add('dark');
    </script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .radial-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at 50% 50%, rgba(139, 92, 246, 0.15), transparent 60%);
            z-index: 1;
            pointer-events: none;
        }

        .bento-card {
            background: rgba(24, 24, 27, 0.6);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 1.5rem;
        }

        html:not(.dark) .bento-card {
            background: rgba(255, 255, 255, 0.8);
            border-color: rgba(0, 0, 0, 0.08);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        .glass-nav {
            background: rgba(9, 9, 11, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        html:not(.dark) .glass-nav {
            background: rgba(255, 255, 255, 0.85);
        }
    </style>
</head>

<body
    class="antialiased min-h-screen flex flex-col relative overflow-x-hidden bg-white dark:bg-[#09090B] text-slate-900 dark:text-white">

    <div class="radial-bg"></div>

    <nav class="relative z-50 glass-nav border-b border-gray-200 dark:border-white/5 sticky top-0">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-20 items-center">
                <a href="index.html" class="flex items-center gap-3 group cursor-pointer">
                    <div
                        class="bg-primary-500 p-1.5 rounded-xl text-white shadow-[0_0_15px_rgba(139,92,246,0.5)] transition-transform duration-300 group-hover:scale-110">
                        <img src="imagenes/compressly_logo.png" alt="Logo Compressly"
                            class="w-7 h-7 object-contain translate-x-[0.8px] -translate-y-[1.5px]">
                    </div>
                    <span
                        class="text-2xl font-extrabold text-slate-900 dark:text-white tracking-tight">Compressly</span>
                </a>

                <div class="flex items-center gap-3">
                    <button id="themeToggle"
                        class="text-gray-500 dark:text-gray-400 hover:text-primary-500 focus:outline-none p-2 rounded-lg transition-colors">
                        <i data-lucide="sun" class="w-5 h-5 hidden dark:block text-yellow-400"></i>
                        <i data-lucide="moon" class="w-5 h-5 block dark:hidden text-gray-400"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex items-center justify-center relative z-10 w-full px-4 text-center">
        <div class="w-full max-w-lg">
            <div
                class="bento-card p-12 shadow-[0_0_50px_rgba(139,92,246,0.1)] border-t-primary-500/50 flex flex-col items-center">

                <div
                    class="w-24 h-24 bg-primary-500/10 rounded-full flex items-center justify-center mb-6 text-primary-500 dark:text-primary-400 relative">
                    <div class="absolute inset-0 bg-primary-500/20 rounded-full blur-xl animate-pulse"></div>
                    <i data-lucide="ghost" class="w-12 h-12 relative z-10"></i>
                </div>

                <h1
                    class="text-7xl font-black text-transparent bg-clip-text bg-gradient-to-r from-primary-500 to-primary-600 dark:from-primary-400 dark:to-primary-600 mb-2">
                    404</h1>
                <h2 class="text-2xl font-extrabold text-slate-900 dark:text-white mb-4">Magia no encontrada</h2>

                <p class="text-gray-500 dark:text-gray-400 font-medium mb-8 leading-relaxed">
                    Parece que la página que buscas ha sido comprimida tanto que desapareció. Volvamos a la zona segura.
                </p>

                <a href="index.html"
                    class="w-full bg-primary-500 hover:bg-primary-600 active:scale-95 text-white font-extrabold py-4 px-8 rounded-xl transition-all shadow-[0_0_20px_rgba(139,92,246,0.3)] flex items-center justify-center gap-3">
                    <i data-lucide="home" class="w-5 h-5 text-white"></i> <span class="text-white">Volver al
                        Inicio</span>
                </a>
            </div>
        </div>
    </main>

    <script>lucide.createIcons();</script>
    <script src="interfaz.js"></script>
</body>

</html>
